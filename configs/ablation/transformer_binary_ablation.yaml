main_script: main.py
config_name: config
ablation_name: transformer_binary_ablation

choices:
  data: sample_binary
  model: transformer
  trainer: binary
  training_loop: default
  metrics: default

monitor_metric: val_auc
monitor_mode: max
output_root: result/ablation
seeds: [42, 43, 44]
seed_overrides:
  - random.seed
seed_controls_data_split: false

base_overrides:
  training_loop.epochs: 2
  training_loop.batch_size: 128
  training_loop.monitor_metric: val_auc
  training_loop.monitor_mode: max

variants:
  - name: full
    overrides: {}
  - name: shallow_encoder
    overrides:
      model.n_layers: 1
  - name: small_hidden
    overrides:
      model.hidden_dim: 32
