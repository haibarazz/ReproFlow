defaults:
  - data: sample_binary
  - model: transformer
  - training_loop: default
  - trainer: binary
  - metrics: default
  - _self_

device: "cuda"

experiment:
  name: reproflow_sample
  tags: []

random:
  seed: 42
  cudnn_deterministic: true
  cudnn_benchmark: false
  use_deterministic_algorithms: false
  deterministic_warn_only: true
  python_hash_seed: null

tracking:
  enabled: false
  output_dir: "result/tracking"
  experiment_id: null
  run_id: null

best_model_path: "checkpoints/${data.name}/${hydra:runtime.choices.model}.pth"
log_path: "result/${data.name}/${hydra:runtime.choices.model}"

report:
  enabled: false
  output_dir: "result/reports"

artifacts:
  save_events: false
  save_metrics_json: false
  save_predictions: false
  save_manifest: false

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
