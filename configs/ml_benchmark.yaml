defaults:
  - data: sample_binary
  - _self_

# Traditional ML benchmark. It uses the same configs/data/*.yaml contract as main.py.
task_type: classification

models:
  LogisticRegression: true
  SGDClassifier: true
  LinearRegression: true
  Ridge: true
  Lasso: false
  ElasticNet: false
  DecisionTreeClassifier: true
  DecisionTreeRegressor: true
  RandomForestClassifier: true
  RandomForestRegressor: true
  ExtraTreesClassifier: false
  ExtraTreesRegressor: false
  GradientBoostingClassifier: true
  GradientBoostingRegressor: true
  XGBoostClassifier: false
  XGBoostRegressor: false
  LightGBMClassifier: false
  LightGBMRegressor: false
  CatBoostClassifier: false
  CatBoostRegressor: false
  AdaBoostClassifier: true
  AdaBoostRegressor: false
  SVC: false
  LinearSVC: false
  SVR: false
  KNeighborsClassifier: false
  KNeighborsRegressor: false
  GaussianNB: false
  MultinomialNB: false
  BernoulliNB: false

metrics:
  accuracy: true
  precision: true
  recall: true
  f1: true
  roc_auc: true
  confusion_matrix: false
  mse: true
  mae: true
  r2: true
  rmse: true

output:
  save_dir: ml_results
  verbose: false
  primary_metric: null
  save_format:
    csv: true
    json: false

param_search:
  enable: false
  search_type: grid
  cv: 5
  n_iter: 10
